version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sorint-fleet-postgres
    environment:
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fleet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3000:3000"
volumes:
  postgres-data:
    driver: local

networks:
  fleet-network:
    driver: bridge
