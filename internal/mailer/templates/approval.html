<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
</head>

<body style="margin:0;padding:0;background:#09090b;font-family:Inter,system-ui,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#09090b;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0"
          style="background:#18181b;border:1px solid rgba(255,255,255,0.14);border-radius:14px;padding:36px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="width:48px;height:48px;background:#6366f1;border-radius:12px;
                      font-size:1.4rem;line-height:48px;text-align:center;">🚐</div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <h1 style="margin:0;font-size:1.5rem;font-weight:800;color:#fafafa;">Account approvato!</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;color:#a1a1aa;font-size:.9rem;line-height:1.6;">
                Ciao <strong style="color:#fafafa;">{{.FirstName}}</strong>,<br>
                il tuo account sulla piattaforma <strong style="color:#fafafa;">Fleet Sorint.lab</strong>
                è stato approvato dall'amministratore.<br>
                Puoi ora accedere e iniziare a utilizzare la piattaforma.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{.AppURL}}/login" style="display:inline-block;background:#6366f1;color:#fff;
                    text-decoration:none;padding:12px 32px;border-radius:8px;
                    font-weight:600;font-size:.95rem;">
                Accedi alla piattaforma →
              </a>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;color:#52525b;font-size:.75rem;">
                Se non riesci a cliccare il bottone, copia questo link:<br>
                <a href="{{.AppURL}}/login" style="color:#818cf8;">{{.AppURL}}/login</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
